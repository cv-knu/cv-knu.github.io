# =============================================================================
# Publications shown on /publications/  (grouped by year, newest year first).
#
# To add a paper, copy one entry block below and fill it in. Fields:
#   title    (required)
#   authors  (required)  comma-separated. Names in _data/lab_members.yml are
#                        automatically bolded. Mark equal contribution with *.
#   venue    (required)  e.g. CVPR, NeurIPS, ICCV, TPAMI ...
#                        Journals and conferences share this one list.
#   type     (optional)  colored badge for journal papers. One of:
#                        BKCS, Q1, Q2, Q3, Q4, KCI
#                        Leave it off for conference papers (no badge).
#   year     (required)  used for grouping and ordering.
#   location (optional)  e.g. "Nashville, USA"
#   links:   (optional)  any of paper / arxiv / code / project.
#                        paper = DOI / journal page / PDF (use this for journals).
#                        Omit the ones you don't have — only present links show.
#
# Within the same year, entries are shown top-to-bottom in file order,
# so put the newest paper of a year first.
# =============================================================================

