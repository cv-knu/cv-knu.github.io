---
title: "News"
layout: single
permalink: /news/
author_profile: false
---

<style>
    /* Match the other pages: full content width + masthead-to-title spacing. */
    @media (min-width: 1024px) {
        #main .page {
            width: 100%;
            padding-inline-end: 0;
        }
    }

    #main .page__inner-wrap {
        margin-top: 1.2em;
    }

    .news-board {
        max-width: 1000px;
        margin-inline: auto;   /* centered column so rows aren't left-shifted */
    }

    .news-board .news-row {
        display: flex;
        align-items: stretch;
        gap: 1.6em;
        padding: 1em 0;
        border-bottom: 1px solid #eee;
        text-decoration: none;
        color: inherit;
    }

    .page__content .news-board .news-row:hover {
        text-decoration: none;
    }

    .news-board .news-row:hover .news-title {
        color: #CC4125;
        text-decoration: underline;
    }

    .news-board .news-thumb {
        flex: 0 0 auto;
        width: 330px;
        height: 180px;
        border-radius: 6px;
        overflow: hidden;
        background: #fff;
    }

    .news-board .news-thumb img {
        width: 100%;
        height: 100%;
        object-fit: contain;   /* show the whole image (fit), never crop */
        display: block;
    }

    .news-board .news-thumb--empty {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        background: #f0f0f0;
        color: #ccc;
        font-size: 1.8em;
    }

    .news-board .news-main {
        flex: 1 1 auto;
        min-width: 0;
        display: flex;
        flex-direction: column;
    }

    .news-board .news-title {
        font-size: 1em;
        font-weight: 700;
        line-height: 1.3;
        margin-bottom: 4px;
        transition: color 0.15s ease;
    }

    .news-board .news-date {
        margin-top: auto;   /* pin the date to the bottom of the row */
        padding-top: 0.5em;
        font-size: 0.78em;
        color: #999;
    }

    .news-board .news-excerpt {
        font-size: 0.82em;
        color: #555;
        line-height: 1.5;
    }

    .news-pagination {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 1.6em;
    }

    .news-pagination .pg-btn {
        border: 1px solid #ddd;
        background: #fff;
        color: #444;
        border-radius: 4px;
        padding: 3px 10px;
        font-size: 0.85em;
        cursor: pointer;
        transition: background 0.15s, color 0.15s, border-color 0.15s;
    }

    .news-pagination .pg-btn:hover:not(:disabled) {
        border-color: #CC4125;
        color: #CC4125;
    }

    .news-pagination .pg-btn.active {
        background: #CC4125;
        color: #fff;
        border-color: #CC4125;
    }

    .news-pagination .pg-btn:disabled {
        opacity: 0.4;
        cursor: default;
    }

    @media (max-width: 600px) {
        .news-board .news-row {
            gap: 0.8em;
        }
        .news-board .news-thumb {
            width: 194px;
            height: 106px;
        }
    }
</style>

<div class="news-board">
    {% for post in site.posts %}
    <a class="news-row" href="{{ post.url | relative_url }}">
        <div class="news-thumb">
            {% if post.header.teaser %}
            <img src="{{ post.header.teaser | relative_url }}" alt="{{ post.title }}">
            {% else %}
            <span class="news-thumb--empty"><i class="fas fa-image"></i></span>
            {% endif %}
        </div>
        <div class="news-main">
            <div class="news-title">{{ post.title }}</div>
            <div class="news-excerpt">{{ post.excerpt | strip_html | strip_newlines | truncate: 160 }}</div>
            <div class="news-date">{{ post.date | date: "%b %-d, %Y" }}</div>
        </div>
    </a>
    {% endfor %}
</div>

<div class="news-pagination"></div>

<script>
    (function () {
        var perPage = 6;
        var rows = Array.prototype.slice.call(document.querySelectorAll('.news-board .news-row'));
        var pag = document.querySelector('.news-pagination');
        var pageCount = Math.ceil(rows.length / perPage);

        function show(page) {
            rows.forEach(function (r, i) {
                r.style.display = (i >= (page - 1) * perPage && i < page * perPage) ? '' : 'none';
            });
            renderPag(page);
        }

        function renderPag(page) {
            if (pageCount <= 1) { pag.innerHTML = ''; return; }
            var html = '<button class="pg-btn" data-p="' + (page - 1) + '"' + (page === 1 ? ' disabled' : '') + '>&lsaquo;</button>';
            for (var p = 1; p <= pageCount; p++) {
                html += '<button class="pg-btn' + (p === page ? ' active' : '') + '" data-p="' + p + '">' + p + '</button>';
            }
            html += '<button class="pg-btn" data-p="' + (page + 1) + '"' + (page === pageCount ? ' disabled' : '') + '>&rsaquo;</button>';
            pag.innerHTML = html;
            Array.prototype.forEach.call(pag.querySelectorAll('.pg-btn'), function (b) {
                b.addEventListener('click', function () {
                    var p = parseInt(this.getAttribute('data-p'), 10);
                    if (p >= 1 && p <= pageCount) show(p);
                });
            });
        }

        if (rows.length) show(1);
    })();
</script>
