<!-- start custom head snippets -->

<!-- insert favicons. use https://realfavicongenerator.net/ -->
<link rel="icon" type="image/png" href="{{ '/assets/images/favicon.png' | relative_url }}">
<link rel="shortcut icon" href="{{ '/assets/images/favicon.ico' | relative_url }}">

<style>
    /* Single-layout pages: drop the theme's reserved right-sidebar gutter. */
    @media (min-width: 1024px) {
        #main .page {
            width: 100%;
            padding-inline-end: 0;
        }
    }

    /* Blog posts only: constrain to ~the News board width, centered
       (custom pages set their own widths and are unaffected). */
    .page--post {
        float: none;
        max-width: 1000px;
        margin-inline: auto;
    }

    .page--post .page__inner-wrap {
        float: none;
    }

    /* Blog post body: slightly smaller text and a touch more spacing. */
    .page--post .page__content {
        font-size: 0.95em;
    }

    .page--post .page__content p {
        margin-bottom: 0.8em;
    }

    /* Registered teaser image, centered at the end of the post. */
    .post-teaser {
        text-align: center;
        margin-top: 1.8em;
    }

    .post-teaser img {
        max-width: 100%;
        max-height: 380px;
        border-radius: 6px;
    }

    /* Post tags / categories: keep the "Tags:/Categories:" labels at the normal
       meta size (same as "Updated"); only the chips stay small and compact. */
    .page__taxonomy-item {
        font-size: 0.75em;
        padding: 2px 8px;
        margin-bottom: 5px;
    }

    /* Previous / Next pager buttons: shorter (less vertical padding). */
    .pagination--pager {
        padding: 0.45em 2em;
    }

    /* Masthead wordmark: heavier weight, slight tracking, brand-red accent. */
    .site-title {
        font-weight: 800;
        letter-spacing: 0.3px;
    }

    .site-title .wm-accent {
        color: #cc4125;
    }

    /* Masthead nav: smooth hover + a red underline that slides in on hover.
       (Theme sets `transition: none` on nav links, so re-enable it here.) */
    .visible-links a {
        position: relative;
        font-weight: 600;
        font-size: 0.88em;
        letter-spacing: 0.02em;
        transition: color 0.15s ease;
    }

    .visible-links a::after {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        bottom: -2px;
        height: 2px;
        background: #cc4125;
        transform: scaleX(0);
        transform-origin: left;
        transition: transform 0.2s ease;
    }

    .visible-links a:hover::after {
        transform: scaleX(1);
    }

    /* In-content links: smooth color transition on hover. */
    .page__content a {
        transition: color 0.15s ease;
    }
</style>

<!-- end custom head snippets -->
